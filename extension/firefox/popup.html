<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>BuscaLogo Agent</title>
  <style>
    body {
      margin: 0;
      min-width: 300px;
      font: 13px/1.4 system-ui, sans-serif;
      color: #1a1a1a;
      background: #faf8f5;
    }
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid #e8e0d4;
      background: #fff;
    }
    header img { width: 28px; height: 28px; }
    header h1 { margin: 0; font-size: 14px; font-weight: 650; }
    main { padding: 12px 14px 16px; }
    .status { margin: 0 0 10px; padding: 8px 10px; border-radius: 8px; background: #eee; }
    .status.ok { background: #e8f5e9; color: #1b5e20; }
    .status.warn { background: #fff3e0; color: #e65100; }
    .status.err { background: #ffebee; color: #b71c1c; }
    .url { word-break: break-all; color: #555; font-size: 12px; margin-bottom: 10px; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 12px;
      padding: 8px 10px;
      background: #fff;
      border: 1px solid #e8e0d4;
      border-radius: 8px;
    }
    .toggle-row label { display: flex; flex-direction: column; gap: 2px; }
    .toggle-row small { color: #666; font-size: 11px; }
    button {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 9px 12px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      background: #e65100;
      color: #fff;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    button.secondary { background: #333; margin-top: 8px; }
    a.panel { display: block; margin-top: 10px; text-align: center; color: #1565c0; }
    #perm-hint { display: none; margin: 0 0 10px; font-size: 12px; color: #b71c1c; }
  </style>
</head>
<body>
  <header>
    <img src="icons/icon48.png" alt="">
    <h1>BuscaLogo Agent</h1>
  </header>
  <main>
    <div class="toggle-row">
      <label for="page-alert">
        Alerta na página
        <small>Chip na página (pode fechar com ×)</small>
      </label>
      <input id="page-alert" type="checkbox" checked>
    </div>
    <p id="perm-hint"></p>
    <div id="status" class="status">Verificando…</div>
    <div id="url" class="url"></div>
    <button id="suggest" hidden>Sugerir indexação</button>
    <button id="allow-agent" class="secondary" hidden>Permitir Agent local</button>
    <button id="refresh" class="secondary">Atualizar</button>
    <a class="panel" href="http://127.0.0.1:9970" target="_blank" rel="noopener">Abrir painel do agente</a>
  </main>
  <script src="popup.js"></script>
</body>
</html>
